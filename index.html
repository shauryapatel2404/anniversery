<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Anniversary Mom & Dad</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4);
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:40px;
      border-radius:25px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    h1{
      font-size:70px;
      color:white;
      text-shadow: 4px 4px 10px rgba(0,0,0,0.3);
      margin-bottom:20px;
      animation: glow 2s infinite alternate;
    }

    h2{
      font-size:40px;
      color:#fff;
      margin-bottom:20px;
    }

    p{
      font-size:24px;
      color:white;
      max-width:700px;
      line-height:1.6;
    }

    .heart{
      color:red;
      font-size:60px;
      animation: heartbeat 1s infinite;
      margin-top:20px;
    }

    @keyframes glow{
      from{
        text-shadow:0 0 10px #fff;
      }
      to{
        text-shadow:0 0 25px #ff4b8b, 0 0 40px #ff4b8b;
      }
    }

    @keyframes heartbeat{
      0%{ transform:scale(1); }
      25%{ transform:scale(1.2); }
      50%{ transform:scale(1); }
      75%{ transform:scale(1.2); }
      100%{ transform:scale(1); }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* Floating hearts */
    .floating-heart{
      position:absolute;
      color:white;
      font-size:25px;
      animation: float 10s linear infinite;
      opacity:0.7;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0);
      }
      100%{
        transform:translateY(-120vh) scale(1.5);
      }
    }
  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <div class="floating-heart" style="left:10%;">❤</div>
  <div class="floating-heart" style="left:25%; animation-delay:2s;">❤</div>
  <div class="floating-heart" style="left:50%; animation-delay:4s;">❤</div>
  <div class="floating-heart" style="left:70%; animation-delay:1s;">❤</div>
  <div class="floating-heart" style="left:90%; animation-delay:3s;">❤</div>

  <div class="container">
    <h1>Happy Anniversary</h1>

    <h2>Dear Mom & Dad</h2>

    <p>
      Wishing you both a lifetime filled with love,
      happiness, and beautiful memories.
      Thank you for being the best parents ever.
      Your love inspires me every day.
    </p>

    <div class="heart">❤</div>
  </div>

</body>
</html>
